<footer class="site-footer" aria-label="Site footer">
  <div class="footer-grid">
    <div class="footer-brand">
      <span class="brand-mark" aria-hidden="true">{{ site.Params.shortName }}</span>
      <p>{{ site.Title }}</p>
      <small>{{ site.Params.location }}</small>
    </div>

    <div class="footer-note">
      <p>For useful problems, ambitious ideas and technology that deserves to exist.</p>
      <a href="mailto:{{ site.Params.email }}">{{ site.Params.email }} <span aria-hidden="true">↗</span></a>
    </div>

    <div class="footer-meta">
      <span>Independent technology studio</span>
      <span>© {{ now.Year }} {{ site.Params.shortName }}</span>
    </div>
  </div>
</footer>
